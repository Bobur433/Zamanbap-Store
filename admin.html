<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Zamanbap Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; }

        .admin-auth-overlay {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.35), transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(124, 58, 237, 0.3), transparent 45%),
                linear-gradient(135deg, rgba(5, 9, 20, 0.97), rgba(10, 16, 32, 0.95));
            backdrop-filter: blur(14px);
            overflow: hidden;
        }
        .admin-auth-overlay.is-hidden { display: none; }
        .admin-auth-overlay::before,
        .admin-auth-overlay::after {
            content: "";
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            filter: blur(70px);
            animation: authOrbFloat 9s ease-in-out infinite;
            pointer-events: none;
        }
        .admin-auth-overlay::before {
            top: -60px; left: -60px;
            background: radial-gradient(circle, rgba(59, 130, 246, .5), transparent 70%);
        }
        .admin-auth-overlay::after {
            bottom: -80px; right: -60px;
            background: radial-gradient(circle, rgba(139, 92, 246, .45), transparent 70%);
            animation-delay: -4s;
        }

        .admin-auth-card {
            position: relative;
            width: min(100%, 430px);
            padding: 36px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 70px rgba(2, 6, 23, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: authCardIn 0.55s cubic-bezier(.22,1,.36,1) both;
        }

        .admin-auth-icon {
            width: 70px; height: 70px; margin: 0 auto 18px;
            display: grid; place-items: center; border-radius: 50%;
            font-size: 32px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
            animation: authIconPulse 2.2s ease-in-out infinite;
        }

        .admin-auth-card h1 {
            margin: 0 0 10px; font-size: 24px;
            background: linear-gradient(115deg, #2563eb, #7c3aed);
            -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
        }
        .admin-auth-card p { margin: 0 0 20px; color: #6b7280; line-height: 1.6; }

        .admin-auth-form { display: flex; flex-direction: column; gap: 12px; }

        .admin-auth-input {
            width: 100%; padding: 14px 16px;
            border: 1px solid #d1d5db; border-radius: 14px;
            font-size: 20px; letter-spacing: 0.25em; text-align: center;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }
        .admin-auth-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
            transform: translateY(-1px);
        }
        .admin-auth-input.is-invalid {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
            animation: authInputShake 0.4s ease;
        }

        .admin-auth-error {
            min-height: 20px; margin: 0; font-size: 14px;
            color: #dc2626; font-weight: 600;
        }

        .admin-auth-form .btn-primary {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            box-shadow: 0 12px 26px rgba(37, 99, 235, 0.32);
        }

        @keyframes authCardIn {
            from { opacity: 0; transform: translateY(18px) scale(.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes authIconPulse {
            0%, 100% { box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35); transform: scale(1); }
            50% { box-shadow: 0 14px 38px rgba(124, 58, 237, 0.4); transform: scale(1.05); }
        }
        @keyframes authOrbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
        @keyframes authInputShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .camera-field { display: flex; flex-direction: column; gap: 10px; }
        .camera-actions { display: flex; flex-wrap: wrap; gap: 10px; }
        .camera-trigger { flex: 1; min-width: 220px; justify-content: center; }

        .camera-preview {
            min-height: 180px; display: grid; place-items: center; padding: 12px;
            border: 1px dashed #cbd5e1; border-radius: 16px;
            background: #f8fafc; color: #64748b; text-align: center; overflow: hidden;
        }
        .camera-preview.is-filled { padding: 0; }
        .camera-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .camera-preview-empty { padding: 18px; line-height: 1.5; }

        @media (max-width: 900px) {
            .admin-page { padding: 12px 0 24px; }
            .admin-grid { display: block; padding: 0 10px; }
            .panel-card { padding: 16px; margin: 10px 0; border-radius: 18px; }
            .admin-form-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
            .admin-mobile-action { width: 100%; min-height: 48px; border-radius: 999px; }
            .phone-form label { gap: 6px; }
            .phone-form input, .phone-form select, .phone-form textarea {
                min-height: 48px; font-size: 16px; border-radius: 12px;
            }
            .camera-actions { flex-direction: column; gap: 8px; }
            .camera-trigger { min-width: 100%; min-height: 48px; }
            .camera-preview { min-height: 150px; }
            .form-actions { flex-direction: column; gap: 8px; }
            .form-actions .btn { width: 100%; min-height: 48px; }
            .admin-item { flex-direction: column; align-items: flex-start; }
            .admin-item-actions { width: 100%; display: flex; flex-direction: column; gap: 8px; }
            .admin-item-actions .btn { width: 100%; min-height: 48px; }
        }
    </style>
</head>
<body>
    <nav class="navbar admin-navbar" id="navbar" hidden>
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <img class="logo-icon" src="logo.jpeg" alt="Zamanbap Store">
                <span class="logo-text">Zamanbap<span class="logo-accent">Store</span></span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему" title="Переключить тему">
                    <span id="themeIcon">🌙</span>
                </button>
                <a href="index.html" class="nav-cta">Каталог</a>
            </div>
        </div>
    </nav>

    <div id="adminAuthOverlay" class="admin-auth-overlay" aria-live="polite">
        <div class="admin-auth-card">
            <div class="admin-auth-icon">🔐</div>
            <h1>Доступ к админ-панели</h1>
            <p>Введите PIN-код, чтобы открыть управление товарами.</p>
            <form id="adminAuthForm" class="admin-auth-form" novalidate>
                <input
                    type="password"
                    id="adminPinInput"
                    class="admin-auth-input"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    maxlength="4"
                    placeholder="••••"
                    required
                >
                <button class="btn btn-primary" type="submit">Войти</button>
                <p id="adminAuthError" class="admin-auth-error" role="alert"></p>
            </form>
        </div>
    </div>

    <main class="admin-page" id="adminPage" hidden>
        <div class="container admin-grid">
            <section class="panel-card admin-form-section" data-animate="fade-up">
                <div class="section-header admin-form-header">
                    <div>
                        <span class="section-tag">Добавить товар</span>
                        <h2 class="section-title">Форма телефона</h2>
                    </div>
                    <button class="btn btn-secondary admin-mobile-action" type="button" id="openAddPhoneButton">Добавить телефон</button>
                </div>
                <form id="phoneForm" class="phone-form">
                    <input type="hidden" id="phoneId">
                    <label>Название модели
                        <input type="text" id="model" placeholder="Например iPhone 13 Pro" required>
                    </label>
                    <label>Бренд
                        <input type="text" id="brand" placeholder="Apple" required>
                    </label>
                    <label>Цена (сом)
                        <input type="number" id="price" placeholder="69990" required>
                    </label>
                    <label>Память
                        <input type="text" id="memory" placeholder="256 ГБ">
                    </label>
                    <label>Цвет
                        <input type="text" id="color" placeholder="Графитовый">
                    </label>
                    <label>Состояние
                        <select id="state">
                            <option value="Новое">Новое</option>
                            <option value="Отличное">Отличное</option>
                            <option value="Хорошее">Хорошее</option>
                            <option value="Есть дефекты">Есть дефекты</option>
                        </select>
                    </label>
                    <label>Характеристики
                        <textarea id="specs" rows="4" placeholder="OLED, 120 Гц, 5G"></textarea>
                    </label>
                    <label>Особенности
                        <textarea id="features" rows="4" placeholder="Что особенно важно в устройстве"></textarea>
                    </label>
                    <label>Дефекты
                        <textarea id="defects" rows="4" placeholder="Если дефектов нет — оставьте пустым"></textarea>
                    </label>
                    <label class="camera-field">
                        <span>Фото передней стороны</span>
                        <div class="camera-actions">
                            <button class="btn btn-primary camera-trigger" type="button" data-trigger-image="frontImage">📷 Сфотографировать переднюю сторону</button>
                            <button class="btn btn-secondary" type="button" data-trigger-image="frontImage">Заменить</button>
                        </div>
                        <div id="frontImagePreview" class="camera-preview">
                            <div class="camera-preview-empty">Снимок появится здесь</div>
                        </div>
                        <input type="file" id="frontImage" accept="image/*" capture="environment" hidden>
                    </label>
                    <label class="camera-field">
                        <span>Фото задней стороны</span>
                        <div class="camera-actions">
                            <button class="btn btn-primary camera-trigger" type="button" data-trigger-image="backImage">📷 Сфотографировать заднюю сторону</button>
                            <button class="btn btn-secondary" type="button" data-trigger-image="backImage">Заменить</button>
                        </div>
                        <div id="backImagePreview" class="camera-preview">
                            <div class="camera-preview-empty">Снимок появится здесь</div>
                        </div>
                        <input type="file" id="backImage" accept="image/*" capture="environment" hidden>
                    </label>
                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit">Добавить телефон</button>
                        <button class="btn btn-secondary" type="button" id="resetForm">Сбросить</button>
                    </div>
                </form>
            </section>

            <section class="panel-card" data-animate="fade-up" data-delay="100">
                <div class="section-header">
                    <span class="section-tag">Товары</span>
                    <h2 class="section-title">Список телефонов</h2>
                </div>
                <div id="adminPhones" class="admin-list"></div>
            </section>
        </div>
    </main>

    <script type="module" src="script.js"></script>
    <script>
    (function () {
        const ADMIN_PIN = '7761';
        const authOverlay = document.getElementById('adminAuthOverlay');
        const adminPage = document.getElementById('adminPage');
        const authForm = document.getElementById('adminAuthForm');
        const pinInput = document.getElementById('adminPinInput');
        const authError = document.getElementById('adminAuthError');
        const adminNavbar = document.getElementById('navbar');

        if (!authOverlay || !adminPage || !authForm || !pinInput || !authError || !adminNavbar) {
            console.error('Admin auth: не найден один из элементов', {
                authOverlay, adminPage, authForm, pinInput, authError, adminNavbar
            });
            return;
        }

        function clearError() {
            authError.textContent = '';
            pinInput.classList.remove('is-invalid');
        }

        function showError(message) {
            authError.textContent = message;
            pinInput.classList.add('is-invalid');
        }

        function openAdminPanel() {
            clearError();
            authOverlay.classList.add('is-hidden');
            adminPage.hidden = false;
            adminNavbar.hidden = false;
        }

        function closeAdminPanel() {
            authOverlay.classList.remove('is-hidden');
            adminPage.hidden = true;
            adminNavbar.hidden = true;
        }

        closeAdminPanel();

        pinInput.addEventListener('input', () => {
            pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
            if (authError.textContent) clearError();
        });

        authForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const enteredPin = pinInput.value.trim();

            if (enteredPin === ADMIN_PIN) {
                openAdminPanel();
                pinInput.value = '';
            } else {
                showError('Неверный PIN-код. Попробуйте ещё раз.');
                pinInput.value = '';
                pinInput.focus();
            }
        });
    })();
    </script>
</body>
</html>
